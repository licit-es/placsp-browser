name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.12

      - run: uv sync --frozen --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: No inline noqa
        run: |
          if grep -rn '# noqa' src/ tests/ 2>/dev/null; then
            echo "ERROR: Use per-file-ignores in pyproject.toml instead of inline noqa"
            exit 1
          fi

      - name: Mypy
        run: uv run mypy src/

      - name: Unit tests
        run: uv run pytest tests/etl/unit/ --cov=src --cov-branch --cov-fail-under=0

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: licit
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.12

      - run: uv sync --frozen --dev

      - name: Apply schema + seed
        run: ./schema/apply.sh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/licit

      - name: Integration tests
        run: uv run pytest tests/etl/integration/ --cov=src --cov-branch --cov-fail-under=0
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/licit
          ENVIRONMENT: ci

  notify:
    runs-on: ubuntu-latest
    needs: [quality, integration]
    if: always()
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
          QUALITY: ${{ needs.quality.result }}
          INTEGRATION: ${{ needs.integration.result }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_AUTHOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0

          if [ "$QUALITY" = "success" ] && [ "$INTEGRATION" = "success" ]; then
            COLOR=3066993
            TITLE="✅ Tests passed"
          else
            COLOR=15158332
            TITLE="❌ Tests failed"
          fi

          SHORT_SHA="${COMMIT_SHA:0:7}"
          # Sanitize commit message for JSON (first line only, escape quotes)
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1 | sed 's/"/\\"/g' | cut -c1-80)

          python3 -c "
          import json, urllib.request, os
          payload = json.dumps({'embeds': [{'title': os.environ['TITLE'],
            'url': os.environ['RUN_URL'], 'color': int(os.environ['COLOR']),
            'fields': [
              {'name': 'Commit', 'value': '${SHORT_SHA} ' + os.environ['FIRST_LINE'], 'inline': False},
              {'name': 'Quality', 'value': os.environ['QUALITY'], 'inline': True},
              {'name': 'Integration', 'value': os.environ['INTEGRATION'], 'inline': True},
              {'name': 'Author', 'value': os.environ['COMMIT_AUTHOR'], 'inline': True},
            ]}]}).encode()
          req = urllib.request.Request(os.environ['DISCORD_WEBHOOK'],
            data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req, timeout=10)
          "
