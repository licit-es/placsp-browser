name: Deploy

on:
  workflow_run:
    workflows: [Test]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy via SSH
        id: ssh
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd ${{ secrets.PROJECT_DIR }}
            git pull origin main 2>&1
            ./deploy/deploy.sh 2>&1

      - name: Notify Discord success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          python3 -c "
          import json, urllib.request, os
          msg = os.environ.get('COMMIT_MSG','').split('\n')[0][:80]
          sha = os.environ['COMMIT_SHA'][:7]
          payload = json.dumps({'embeds': [{'title': '🚀 Deploy succeeded',
            'url': os.environ['RUN_URL'], 'color': 3066993,
            'fields': [
              {'name': 'Commit', 'value': sha + ' ' + msg, 'inline': False},
            ]}]}).encode()
          req = urllib.request.Request(os.environ['DISCORD_WEBHOOK'],
            data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req, timeout=10)
          "

      - name: Notify Discord failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          python3 -c "
          import json, urllib.request, os
          sha = os.environ['COMMIT_SHA'][:7]
          payload = json.dumps({'embeds': [{'title': '💥 Deploy FAILED',
            'url': os.environ['RUN_URL'], 'color': 15158332,
            'fields': [
              {'name': 'Commit', 'value': sha, 'inline': False},
              {'name': 'Action', 'value': 'Check logs ↑', 'inline': False},
            ]}]}).encode()
          req = urllib.request.Request(os.environ['DISCORD_WEBHOOK'],
            data=payload, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req, timeout=10)
          "
