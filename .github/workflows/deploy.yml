name: Deploy

on:
  workflow_run:
    workflows: [Test]
    branches: [main]
    types: [completed]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            cd ${{ secrets.PROJECT_DIR }}
            git pull origin main 2>&1
            ./deploy/deploy.sh 2>&1

      - name: Notify Discord success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          COMMIT_MSG: ${{ github.event.workflow_run.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          FIRST_LINE=$(echo "$COMMIT_MSG" | head -1 | cut -c1-80)
          jq -n --arg commit "${COMMIT_SHA:0:7} $FIRST_LINE" --arg url "$RUN_URL" \
            '{embeds: [{title: "🚀 Deploy succeeded", url: $url, color: 3066993,
              fields: [{name: "Commit", value: $commit, inline: false}]}]}' \
          | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"

      - name: Notify Discord failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CI_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK" ] && exit 0
          jq -n --arg commit "${COMMIT_SHA:0:7}" --arg url "$RUN_URL" \
            '{embeds: [{title: "💥 Deploy FAILED", url: $url, color: 15158332,
              fields: [{name: "Commit", value: $commit, inline: false},
                       {name: "Action", value: "Check logs ↑", inline: false}]}]}' \
          | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
