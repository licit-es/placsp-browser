{% extends "base.html" %}

{% block title %}Entrar — licit{% endblock %}

{% block content %}
<div class="form-page">
  <div class="container">
    <h1>Iniciar sesion</h1>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="contrasena">Contrasena</label>
        <input type="password" id="contrasena" name="contrasena" required autocomplete="current-password">
      </div>
      <div class="form-error" id="form-error"></div>
      <div class="form-actions">
        <button type="submit" class="btn">Entrar</button>
      </div>
    </form>

    <p class="mt-lg muted" style="font-size: 0.875rem">
      No tienes cuenta? <a href="/registro">Crear una</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
  var form = document.getElementById('login-form');
  var errorEl = document.getElementById('form-error');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    errorEl.classList.remove('visible');

    var btn = form.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.textContent = 'Entrando...';

    fetch('/v1/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        email: document.getElementById('email').value,
        contrasena: document.getElementById('contrasena').value,
        nombre_clave: 'web'
      })
    })
    .then(function(res) { return res.json().then(function(data) { return {ok: res.ok, data: data}; }); })
    .then(function(r) {
      if (!r.ok) {
        errorEl.textContent = r.data.detail || 'Credenciales incorrectas.';
        errorEl.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Entrar';
        return;
      }
      localStorage.setItem('licit_api_key', r.data.clave_api);
      window.location.href = '/panel';
    })
    .catch(function() {
      errorEl.textContent = 'Error de conexion.';
      errorEl.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Entrar';
    });
  });
})();
</script>
{% endblock %}
