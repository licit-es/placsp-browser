<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}licit{% endblock %}</title>
  <meta name="description" content="{% block description %}API estructurada de licitaciones publicas de Espana{% endblock %}">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <div class="container">
      <a href="/" class="brand">licit</a>
      <div class="nav-links">
        <a href="/docs">API</a>
        <a href="/registro" id="nav-registro">Registro</a>
        <a href="/iniciar-sesion" id="nav-login">Entrar</a>
        <a href="/panel" id="nav-panel" class="hidden">Panel</a>
        <a href="#" id="nav-logout" class="hidden">Salir</a>
      </div>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <div class="container">
      <span>licit &mdash; datos de la <a href="https://contrataciondelestado.es" rel="noopener">PLACSP</a></span>
      <a href="https://github.com/alvdef/placsp-browser" rel="noopener">GitHub</a>
    </div>
  </footer>

  <script>
    // Nav auth state
    (function() {
      var key = localStorage.getItem('licit_api_key');
      if (key) {
        document.getElementById('nav-registro').classList.add('hidden');
        document.getElementById('nav-login').classList.add('hidden');
        document.getElementById('nav-panel').classList.remove('hidden');
        document.getElementById('nav-logout').classList.remove('hidden');
      }
      document.getElementById('nav-logout').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('licit_api_key');
        window.location.href = '/';
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
