services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: licit
      POSTGRES_USER: licit
      POSTGRES_PASSWORD: licit
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licit"]
      interval: 5s
      timeout: 3s
      retries: 5

  schema-init:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: ./schema/apply.sh
    environment:
      DATABASE_URL: postgresql://licit:licit@postgres:5432/licit
      API_PASSWORD: licit_readonly
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://licit_api:licit_readonly@postgres:5432/licit
      ENVIRONMENT: development
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    volumes:
      - ./src:/app/src

volumes:
  pgdata_dev:
