x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:16-alpine
    logging: *default-logging
    environment:
      POSTGRES_DB: licit
      POSTGRES_USER: licit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licit"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  schema-init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: ./schema/apply.sh
    environment:
      DATABASE_URL: postgresql://licit:${POSTGRES_PASSWORD}@postgres:5432/licit
      API_PASSWORD: ${API_PASSWORD:-licit_readonly}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000
    logging: *default-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/salud')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    environment:
      DATABASE_URL: postgresql://licit_api:${API_PASSWORD:-licit_readonly}@postgres:5432/licit
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    restart: unless-stopped

  etl-cron:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: >
      sh -c "chmod 0644 /etc/cron.d/etl
      && env | grep -E '^(DATABASE_URL|DISCORD_WEBHOOK_URL|PYTHONPATH|ENVIRONMENT|LOG_LEVEL)=' > /etc/environment
      && crontab /etc/cron.d/etl
      && mkdir -p /var/log/etl
      && cron -f"
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://licit:${POSTGRES_PASSWORD}@postgres:5432/licit
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    volumes:
      - etl_logs:/var/log/etl
    restart: unless-stopped

  caddy:
    build: ./caddy
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?Set DOMAIN}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  etl_logs:
  caddy_data:
  caddy_config:
  pgadmin_data:
