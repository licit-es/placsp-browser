services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: licit
      POSTGRES_USER: licit
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U licit"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  schema-init:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends postgresql-client
      && ./schema/apply.sh"
    environment:
      DATABASE_URL: postgresql://licit:${POSTGRES_PASSWORD}@postgres:5432/licit
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: uv run uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://licit:${POSTGRES_PASSWORD}@postgres:5432/licit
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    restart: unless-stopped

  etl-cron:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    command: >
      sh -c "apt-get update && apt-get install -y --no-install-recommends cron
      && mkdir -p /var/log/etl
      && cp deploy/crontab /etc/cron.d/etl
      && chmod 0644 /etc/cron.d/etl
      && crontab /etc/cron.d/etl
      && cron -f"
    environment:
      DATABASE_URL: postgresql://licit:${POSTGRES_PASSWORD}@postgres:5432/licit
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      schema-init:
        condition: service_completed_successfully
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
