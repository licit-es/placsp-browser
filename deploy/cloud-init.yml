#cloud-config
# Hetzner cloud-init for placsp-browser
#
# Fill in the 4 variables below, paste into Hetzner "Cloud config" when
# creating the server. The machine boots ready to serve.
#
# After boot, SSH in and run the initial ETL seed:
#   ssh adf@<ip>
#   cd placsp-browser/deploy
#   docker compose exec etl-cron sh -c \
#     "cd /app && PYTHONPATH=src uv run python -m etl.handlers.feed_reader --seed"
#
# DNS: create an A record for your domain pointing to the server IP.
#   Example: api.licit.es → 1.2.3.4
#   Caddy will auto-obtain HTTPS certs from Let's Encrypt once DNS resolves.

# ── Variables (edit these) ──────────────────────────────────────────
# SSH_PUBKEY:        your public key (ssh-ed25519 AAAA... user@host)
# DOMAIN:            subdomain with A record pointing here (e.g. api.licit.es)
# POSTGRES_PASSWORD: any strong password for the database
# REPO_URL:          git clone URL (https://github.com/licit-es/placsp-browser.git)

# ── User ────────────────────────────────────────────────────────────
users:
  - name: adf
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - <SSH_PUBKEY>

# ── Packages ────────────────────────────────────────────────────────
package_update: true
package_upgrade: true
packages:
  - ufw
  - unattended-upgrades
  - ca-certificates
  - curl
  - git

# ── Commands ────────────────────────────────────────────────────────
runcmd:
  # SSH hardening
  - sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config
  - sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - systemctl restart ssh

  # Firewall
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # Auto-updates
  - dpkg-reconfigure -plow unattended-upgrades

  # Docker (official script)
  - curl -fsSL https://get.docker.com | sh

  # Clone repo & create .env
  - su - adf -c "git clone <REPO_URL> ~/placsp-browser"
  - |
    cat > /home/adf/placsp-browser/deploy/.env << 'ENVEOF'
    POSTGRES_PASSWORD=<POSTGRES_PASSWORD>
    DOMAIN=<DOMAIN>
    ENVEOF
  - chown adf:adf /home/adf/placsp-browser/deploy/.env

  # Start services
  - su - adf -c "cd ~/placsp-browser/deploy && docker compose up -d --build"
